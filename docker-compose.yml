version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: inventory_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: inventory

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
